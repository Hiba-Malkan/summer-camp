<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meow</title>
    <style>
        @font-face {
            font-family: 'Winkle';
            src: url('Winkle-Regular.ttf') format('truetype');
        }
        body {
            font-family: "Winkle", sans-serif;
            background: black;
            color: pink;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-shadow: 0 0 1px pink;
        }
        h1 {
            font-size: 5em;
            text-align: center;
            margin-top: 5%;
            transition: transform 0.3s ease;

        }
        p {
            font-size: 2em;
            text-align: center;
            animation: fadeIn 2s; 
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        img {
            border-radius: 20px;
            height: 250px; 
            width: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease;
        }
        img:hover, h1:hover {
            transform: translateY(-5px) scale(1.05);
            cursor: pointer;
        }

        .container {
            background: black;
            padding: 30px;
            border-radius: 20px; 
            border: 2px solid pink;  
        }
        .button-box {
            width: fit-content;
            margin: 40px auto; 
            padding: 20px 30px;
            background: black;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        button {
            font-family: "Winkle", sans-serif;
            font-size: 1.8em;
            padding: 18px 40px;
            background: #ff69b4;
            color: white;
            border: none; 
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.35);
        }
        button:hover {
            transform: translateY(-4px) scale(1.05);
            background: #ff85c7;
            box-shadow: 0 12px 30px rgba(255, 105, 180, 0.5);
        }
    </style>
    <body>
        <div class="container">
            <h1>Hi! I'm Hiba</h1>
            <p>welcome to my website!</p>
            <p>I love cats, so here is a cat picture:</p>
            <img src="cat.jpg" alt="A cute cat" />
            <p>I also like reading, especially fantasy novels</p>
            <p>Meow!</p>
            <div class="button-box">
                <button>Click Me!</button>
            </div>
        </div>
        
    </body>
</head>
</html>
